    <title>ルーレット</title>
    <style>
	body { 
            font-family: sans-serif; 
            text-align: center; 
            background: #ffffff; /* 全体の背景も白にする */
            margin: 0;           /* ブラウザ特有の余白をゼロにする */
            padding: 0; 
        }
        .container { 
            width: 100vw;        /* 画面の横幅いっぱいに広げる */
            min-height: 100vh;   /* 画面の縦幅いっぱいに広げる（コンテンツが多ければ下に伸びる） */
            margin: 0 auto; 
            background: white; 
            padding: 0px 0px;  /* 上下左右の余白 */
            box-sizing: border-box; /* パディングを含めたサイズ計算にする */
        }
        .image-area { 
            width: 100%;         /* 横幅をコンテナいっぱいに広げる */
            max-width: 527px;    /* 大きくなりすぎないように元の最大幅を指定 */
            aspect-ratio: 527 / 259; /* 元の画像エリアの比率（横:縦）を自動維持する */
            margin: 20px auto; 
            border: 1px solid #333; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #fafafa; 
            border-radius: 8px; 
            overflow: hidden; 
            position: relative; 
            box-sizing: border-box;
        }
        img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;   /* 枠の中に画像を綺麗に収める */
        }
        .placeholder { color: #888; font-size: 18px; font-weight: bold; }
        button { font-size: 20px; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 200px; transition: 0.2s; margin-bottom: 10px; }
        .start-btn { background: #28a745; color: white; }
        .start-btn:hover { background: #218838; }
        .stop-btn { background: #dc3545; color: white; }
        .stop-btn:hover { background: #c82333; }
        
        /* タイトル表示エリア */
        .title-area { font-size: 20px; font-weight: bold; color: #ff3366; margin: 5px auto 10px auto; min-height: 38px; display: flex; align-items: center; justify-content: center; }
        
        /* 説明文エリア */
        .description-area { min-height: 130px; padding: 15px; background: #f8f9fa; border-radius: 5px; border-left: 5px solid #007bff; text-align: left; font-size: 16px; line-height: 1.5; color: #333; }

        /* 設定エリア（新設） */
        .settings-area { margin-top: 40px; padding: 20px; background: #fff; border-radius: 10px; border: 2px dashed #ccc; text-align: left; }
        .settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .settings-title { font-size: 18px; font-weight: bold; margin: 0; color: #444; }
        .settings-count { font-size: 14px; color: #666; font-weight: bold; }
        .btn-small { font-size: 13px; padding: 5px 12px; width: auto; margin-bottom: 0; background: #6c757d; color: white; border-radius: 3px; }
        .btn-small:hover { background: #5a6268; }
        
        /* チェックボックスのグリッド表示 */
        .checkbox-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-height: 280px; overflow-y: auto; padding: 10px; border: 1px solid #ddd; background: #fdfdfd; border-radius: 5px; }
        .checkbox-item { font-size: 14px; display: flex; align-items: center; cursor: pointer; user-select: none; }
        .checkbox-item input { margin-right: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">

        <div class="checkbox-grid" id="checkboxGrid">

</div>

<script>
    // 48枚の画像データ（enabled を追加してON/OFFを管理）
    const items = [
        { title: "うしろやぐら", file: "1.jpg", text: "うしろやぐらとは、いわゆる立ちバックのコト。女性が両手を前につた状態で、男性は立ったまま挿入します。アウトドア時のｈでも代表的な体位。この男性の征服欲を刺激して、女性のm的な興奮を誘うこの体位は、存分に２人でイマジネーションを働かせるのが気持ちよくなれるコツ。", enabled: true },
        { title: "つり橋", file: "2.jpg", text: "つり橋は腰高位とも呼ばれ、正常位の状態から、女性の胴を空に浮かせて腰を支えて持ち上げます。男性が膝立ちになり、その男性の姿が、つり橋のようであることからネーミングされた体位です。男性の腕力が必要で、女性も腕だけじゃなく、腹筋と腰の力で支えることが必要です。この体位は奥が刺激されるので、女性にも人気です。", enabled: true },
        { title: "寄り添い", file: "3.jpg", text: "寄り添いは、挿入をしない体位。２人で横になり、男性が女性に寄り添いあってスキンシップをとりあうこの体位。挿入する体位というよりも愛戯の姿勢である『寄り添い』は、前戯や後戯に使ってみてください。挿入しないでの快感を追求することで、『寄り添い』が、未知の快楽の扉を開いてくれるきっかけになるかもしれません。", enabled: true },
        { title: "撞木ぞり", file: "4.jpg", text: "背面騎乗位でもあり、後背位の女性上位である、撞木ぞり。難易度の高い体位になります。仰向けになった男性の上に、女性が背中を向けてまたがり挿入します。そのまま足を大きく開いて、鏡を向かいにhをすれば、撞木ぞりで繋がりあっている部分がバッチリと見えて興奮度はマックスに！撞木ぞりで、一緒に激しく動いて達しましょう。", enabled: true },
        { title: "獅子舞", file: "5.jpg", text: "『獅子舞』とは、対面座位の一種です。男女が向かい合って座り、二人とも後ろに手をついて身体を支えながら、女性は男性の肩に足を置きます。柔軟度が必要な苦しい姿勢になった女性を支えるのは、男性の腕力のほか、勃起力も大きな要素。しかし、この『獅子舞』はうまくいけば、膣がギュッと締まるので、男性にとっては嬉しい体位です。", enabled: true },
        { title: "菊一文字", file: "6.jpg", text: "バレリーナ並みに広げられた女性の足を前にして、男性は横向けに「一」の字になりせっせと責める『菊一文字』。交叉男性側臥女性仰伏臥位とも言われています。こぼれ松葉から変化したかなり激しい体位です。女性が羞恥心を感じ、さらに男性の腰の動きに合わせて、腰をくねらすことで、今までにない快感を感じれます。", enabled: true },
        { title: "こたつがかり", file: "7.jpg", text: "『こたつがかり』は、座位の一種で、男性が女性に挿入しながらこたつに入ります。内側からも外側からもポカポカになる、季節感たっぷりの座位の後背位。女性が座った男性の上に股がって、こたつの天板についた手を軸に腰を動かします。みかんを前に２人羽織期分で挑戦してみましょう！", enabled: true },
        { title: "テコがかり", file: "8.jpg", text: "『テコがかり』は、男性上位のシックスナインから女性のつま先方向に移動して挿入する、難易度の高い体位。膣の角度とペニスの角度が反対で挿入しにくく、さらに挿入の深度が浅いためかなりアクロバティックな体位になります。この体位は、いつもの挿入とは反対になっているので、普段とは違う挿入感と気持ちよさを味わえます。", enabled: true },
        { title: "岩清水", file: "9.jpg", text: "『岩清水』とは、いわゆる顔面騎乗位です。48手の中でも挿入をしない体位です。流れ出る清水を、舌でどう舐めとってもらえるかが気持ち良さの分かれ目！顔にまたがるなど普段ではしない行為で、新鮮な興奮も高まるので、マンネリで悩んでいるカップルにおすすめします。", enabled: true },
        { title: "時雨茶臼", file: "10.jpg", text: "時雨茶臼は、女性上位、騎乗位と言われる体位です。男性が下から突き上げてもよし、女性が上下左右前後に動かしてもよし、のスタイルですが、やはり女性の動きが、時雨になるか台風になるかを分けることでしょう。男性を喜ばせるためにも、腰を上下にするピストン運動をぜひ試してみてください。", enabled: true },
        { title: "理非知らず", file: "11.jpg", text: "女性の両手、両腿を縛るのが緊縛プレイが『理非知らず』。主導権はすべて男性にあり、2人の間には愛と信頼が必須です。もちろん縛するので、無理強いは禁物。より深く性を探訪したいカップルが新たな世界に挑むときにチョイスして。男性は征服欲を、女性は隷属感を味わえます。", enabled: true },
        { title: "茶臼のばし", file: "12.jpg", text: "『茶臼のばし』は、女性上位で女性が男性の上半身に抱きつくようになり、女性の脚をやや伸ばし気味にして、男性の脚の間に入ります。これだと動きづらいのが難点ですが、男性には締め付け感を与えられ、テクがあまりない女性、上になるのが恥ずかしい女性にも人気です。そして何よりもキスをしながら全身の密着感を楽しめるのが最大のポイント。", enabled: true },
        { title: "こたつ隠れ", file: "13.jpg", text: "『こたつ隠れ』とは、こたつを囲んで向かい合わせに座ったまま、天板の下で繋がりあうという悪戯めいた体位。見つめあって行えば恥ずかしさもあってドキドキ気分が味わえます。彼の大切な部分を足で愛撫して色っぽさを積極的に演出すれば官能映画の主役気分！？ただし夢中になりすぎて、ヤケドしないようご注意を！", enabled: true },
        { title: "乱れ牡丹", file: "14.jpg", text: "『乱れ牡丹』は、座位の一種です。座った男性の上に、脚を大きく広げた女性が後ろ向きで座る体位。どうしても挿入が浅くなりますが、鏡の前で繋がれば、一気に興奮状態に！後ろから女性の首筋を愛撫し、甘い言葉を囁いて。ちなみに牡丹は女性の大切な部分の隠語です。乱れるのは彼女？それとも牡丹？", enabled: true },
        { title: "帆かけ茶臼", file: "15.jpg", text: "『帆かけ茶臼』は、騎乗位や対面座位のアレンジバージョン。男性は女性の両足を両腕で支えながら挿入を。女性はできるだけ脚を大きく開いて、彼に協力してあげましょう。カラダの固い人は要工夫かも…。お互いに繋がりあっている姿をじっくり見ながら腰を動かせば、恥ずかしさも興奮度も一気にマックス！", enabled: true },
        { title: "本駒駆け", file: "16.jpg", text: "『本駒駆け』は、背面座位の一種で、体操座りをした男性の上に、女性が後ろ向きで股がってインサート。深い挿入感を味わえ、早いピストンも出来ます。そのため、男性は下から突き上げて、女性は男性の膝に置いた手を軸に、駆けるような早いリズムでどうぞ。花火大会の後、お互い浴衣姿で…なんていうのも風流ですてき。", enabled: true },
        { title: "百閉", file: "17.jpg", text: "『百閉』は、騎乗位のノーマルバリエーション。気持ちのいい場所を自分で見つけながら動けるのが女性側のメリット。女性が腰を動かしながら、気持ちいい場所を探しましょう。イキにくい女性は、男性がクリを触ってあげるなどすると達しやすくなります。また、女性の動きにあわせて下から突き上げれば一体感も味わえる幸せたっぷりの体位に変身。", enabled: true },
        { title: "雁が首", file: "18.jpg", text: "『雁が首』とは、ズバリ、フェラチオのこと。雁が首のほかにも、『尺八』『千鳥の曲』『ハーモニカ』などという呼び名があり、古今東西好まれているオーラルセックスです。男性は女性に奉仕される喜びを感じます。女性側はある程度のテクニックも必要になってくるので、事前にお勉強をしておきましょう。", enabled: true },
        { title: "しがらみ", file: "19.jpg", text: "『しがらみ』とは、正常位の一種です。男性が挿入した後、女性はm字に股を開かず、脚を閉じてまっすぐ伸ばした体位です。足先をからませれば中がキュッとしまって、男性には堪え難い快楽が。挿入は浅めですが、男性側には締め付けが伝わり、２人の全身の密着感で愛情をたっぷり味わいましょう。", enabled: true },
        { title: "二つ巴", file: "20.jpg", text: "『二つ巴』なんて言うよりは、69（シックスナイン）のほうが分かりやすいかもしれません。基本的には女性上位ですが、横になったスタイルでもok。それぞれが行うクンニやフェラに比べると快楽に集中しにくいけれど、一体感を味わえるのがなによりです。すべてを舐めつくすようにして楽しんでみてください。", enabled: true },
        { title: "御所車", file: "21.jpg", text: "『御所車』は、仰向けに寝転んだ男性の上に女性が乗り、女性上位になって男性器を中心軸に、女性がクルクルとまわるスタイル。別名に、『ナイアガラの滝落とし』『花時計』のほか、大阪方面では『タケコプター』なんて呼ばれているそう。女性にとっては、カラダの運動神経＆器用な腰使いが、ウンと求められるキツーい運動会。", enabled: true },
        { title: "松葉崩し", file: "22.jpg", text: "４８手といえば『松葉崩し』というイメージがあるほど有名な一手。松葉の枝が交差するようにお互いの足をからめあわせてインサート。女性の片足を男性が持ち、角度や深さを調節しながら気持ちのいいツボを探すのがこの体位のお楽しみポイント。ピストン運動をするのではく、奥までインサートしながらグリグリしてみましょう！", enabled: true },
        { title: "碁盤攻め", file: "23.jpg", text: "『碁盤攻め』は、後背位の一種で、女性が碁盤に手をついて、男性が後ろから立位で挿入します。でも碁盤なんてそうそうご自宅にはないと思うので、なにか身の回りにある適当な台でどうぞ。男性は見た目による興奮度が高く、女性は征服されているように感じになり、刺激度の高い体位です。", enabled: true },
        { title: "首引き恋慕", file: "24.jpg", text: "『首引き恋慕』とは、女性が男性に股がるような形で対面座位になり、女性が男性に、男性が女性に、もしくはお互い同時に首に縄をかけながらインサート。本当にこれをすると、危険なのでオススメはしませんがスリリングであることは確か。好奇心旺盛なカップルでも気をつけてチャレンジしてください。", enabled: true },
        { title: "しぼり芙蓉", file: "25.jpg", text: "『絞り芙蓉』とは、背面座位の一種です。座った男性の上に女性が後ろ向きで股がるスタイル。男性は動きづらいため、ここは上にいる女性のガンバリが必要です。その動きによって、きっと男性も後ろから、首すじや耳を唇で責めたり、手で乳首やクリトリスを弄んだりしてくれるはず。感じるがままに激しく動いてみましょう。", enabled: true },
        { title: "仏壇返し", file: "26.jpg", text: "『仏壇返し』は、後背位の一種で、女性が上半身を折り曲げて床に手をついたところに、男性が後ろからイン！女性は「はっけよい」をするように足を肩幅程度に開くと安定します。カラダがかたくてキツい人はどうぞ無理はしないで下さいね。ただし男性側には服従感があり、なかなか刺激的なスタイルなのではないでしょうか。", enabled: true },
        { title: "手懸け", file: "27.jpg", text: "『手懸け』は、こたつかがりにもやや似たスタイルの座位。男性が椅子などに腰掛け、女性が男性の上に腰掛けて行うのがポイントです。挿入が浅いのですが、gスポットに当たりやすい体位です。いつもと違うシチューションで楽しむと興奮度もマックスに！ベッド以外なら、食卓なんてどうでしょう？", enabled: true },
        { title: "椋鳥", file: "28.jpg", text: "『椋鳥』は、シックスナインで男性が上になるバージョンのことです。男性が女性の上になり、お互いが頭と足を逆方向にして組み合わさり、お互いの性器を愛撫し合います。ただし、男性は習性でついつい腰を動かしてしまいがち。女性への配慮をお忘れなく！", enabled: true },
        { title: "窓の月", file: "29.jpg", text: "『窓の月』は、側位の１つ。寝たままバックの形で女性の足の間に男性が片足をぐっと差し込むスタイル。2人が同じ方向を向くため、窓から月を一緒に眺めることができることからこの名前がつけられたそう。女性の片足を持ち上げコントロールすると奥深さだけでなく角度も楽しめ、差し込んだ男性の足がクリトリスをも刺激します。", enabled: true },
        { title: "鳴門", file: "30.jpg", text: "『鳴門』は、バックから挿入するタイプの座位。ポイントは上から股がった女性が大開脚を披露しながら、腰を円を描くように動かすこと。そう、「鳴門」の渦潮のように回してください。脚を大きく広げているため、挿入が深くなるのも特徴です。繋がったまま、どれだけ激しくたくさんグルグルできるかが勝負の分かれ目かも！？", enabled: true },
        { title: "しめ小股", file: "31.jpg", text: "『しめ小股』は、伸長位の一つ。正常位の形で女性が太腿と太腿をギュッとくっつけるように足をからませます。「気持ちいいでしょ？」と男性自身を締め上げます。そして、締め小股は男性をギュッと締めるのと同時に、女性のクリトリスにも刺激が伝わります。気持ちよくなりながら、彼を「まいった！」と言わせてしまいしょう。", enabled: true },
        { title: "千鳥", file: "32.jpg", text: "『千鳥』は、正常位の一つ。膝を折って仰向けになった女性に、正常位の形で男性が挿入します。かなりの女性の柔軟性を必要とするスタイルので、無理をせぬようご注意を。女性はクリトリスがこすれる快感、男性はギュッとしまった感覚を味わえます。とはいっても、長時間のラブタイムは体に負担がかかるので禁物です。", enabled: true },
        { title: "抱き上げ", file: "33.jpg", text: "『抱き上げ』は、後背位の１つ。バックスタイルの体制から、そのまま男性が女性の両足をぐいっと持ち上げたかたち。女性は床にひじをつき、男性はひざをついているのが押し車との違いです。膣口を支点としたテコの動きのイメージで動かします。男性の腕力次第で、深い挿入ができるか、浅くで終わるかの分かれ道です。", enabled: true },
        { title: "流鏑馬", file: "34.jpg", text: "『流鏑馬』は、馬に股がる姿勢の騎乗位こと女性上位の１つ。さらに、男性の首にヒモを巻き付けながらインサートするのが特徴の体位です。ちょっぴり男性を服従させる気分で、腰とヒモを使うのがお楽しみのコツ。巻き付けるヒモはやわらかいバスローブなどがオススメです。", enabled: true },

        { title: "立ち松葉", file: "41.jpg", text: "『立ち松葉』は、松葉崩しの立位バージョン。女性は寝転がっての自転車漕ぎのエクササイズ状態なので、そうとうハード。接着男性も女性の足を支えつつ、腰を動かしつつなので、バランスを崩して転ばないよう要注意です。かなりアクロバティックな体位なので、バランスに注意しながらトライしてみましょう！", enabled: true },

        { title: "宝船", file: "44.jpg", text: "『宝船』は、騎乗位の１つです。松葉崩しを女性上位にしたもの。別名「クロスボンバー」とも。仰向けになった男性の片足を抱き上げて、帆のように立て、それを支柱に女性は腰を動かして。体を足に密着させることで、クリトリスへの刺激も期待でき快感はお宝並み！女性が男性の脚を抱きかかえることがポイントです。", enabled: true },
        { title: "押し車", file: "45.jpg", text: "『押し車』は、後背位の１つ。体操などでする手押し車の体制で、男性は女性に挿入。そしてそのまま前方向に移動。ペニスが抜けないように注意をしながら、女性は腕立て伏せのような形をキープ。太もみの筋肉が締まるので、膣の締まりがよくなり、男性の快感に繋がりますが、体力消耗はするでしょう。", enabled: true },
        { title: "深山", file: "46.jpg", text: "『深山』は、屈曲位のひとつ。正常位からこのスタイルへはスムーズに移行可能です。女性の足をv字に開き、高く持ち上げたまま、男性は奥深くまでインサートします。女性からは見にくいけれど、男性からは繋がっている部分が丸見えです。深い挿入感を感じられ、強く突かれたときは奥への衝撃を感じられます。", enabled: true },

        { title: "鶯の谷渡り", file: "48.jpg", text: "『鶯の谷渡り（うぐいすのたにわたり）』は、口＆唇のみを使った愛撫のこと。男性が仰向けに寝ている女性の身体をうぐいすのようについばんで移動していく体位です。愛撫する側は、うぐいすになったつもりで、あっち、こっちをチュンチュンと移動して。hにさえずりながら、気持ちいい場所を探しましょう！", enabled: true }
    ];

    let timerId = null;
    let isRunning = false;
    let currentActiveIndex = 0; // 有効な候補の中でのインデックス
    let activeItems = [];       // チェックがついている画像だけのリスト

    const imageArea = document.getElementById('imageArea');
    const actionBtn = document.getElementById('actionBtn');
    const titleArea = document.getElementById('titleArea');
    const descriptionArea = document.getElementById('descriptionArea');
    const checkboxGrid = document.getElementById('checkboxGrid');
    const settingsCount = document.getElementById('settingsCount');

    // ページ読み込み時にチェックボックスリストを生成
    window.onload = function() {
        createCheckboxList();
        updateCount();
    };

// チェックボックス一覧を生成する関数
    function createCheckboxList() {
        checkboxGrid.innerHTML = '';
        items.forEach((item, index) => {
            const label = document.createElement('label');
            label.className = 'checkbox-item';
            
            // 番号を2桁の半角文字にする ("01", "02"...)
            const numStr = String(index + 1).padStart(2, '0');

            // 括弧と数字を半角に変更
            label.innerHTML = `
                <input type="checkbox" id="chk-${index}" checked onchange="toggleItem(${index}, this.checked)">
                (${numStr}) ${item.title}
            `;
            checkboxGrid.appendChild(label);
        });
    }

    // 個別のチェックON/OFF処理
    function toggleItem(index, isChecked) {
        items[index].enabled = isChecked;
        updateCount();
    }

    // すべて選択 / すべて解除
    function setAllCheckboxes(status) {
        items.forEach((item, index) => {
            item.enabled = status;
            const chk = document.getElementById(`chk-${index}`);
            if (chk) chk.checked = status;
        });
        updateCount();
    }

    // 選択枚数の表示更新
    function updateCount() {
        const count = items.filter(item => item.enabled).length;
        settingsCount.innerText = `選択中: ${count} / ${items.length} 枚`;
    }

    // ルーレットのスタート・ストップ
    function toggleRoulette() {
        if (!isRunning) {
            // 現在チェックが入っているアイテム（有効な画像）だけを抽出
            activeItems = items.filter(item => item.enabled);

            // 1枚も選ばれていない場合はエラーを出す
            if (activeItems.length === 0) {
                alert("ルーレットに含める画像を最低1つ以上選択してください！");
                return;
            }

            // スタート処理
            isRunning = true;
            actionBtn.innerText = "ストップ！";
            actionBtn.className = "stop-btn";
            titleArea.innerText = ""; 
            descriptionArea.innerText = "ルーレット中..."; 
            
            // 有効な画像リストの中からランダムで高速表示
            timerId = setInterval(() => {
                currentActiveIndex = Math.floor(Math.random() * activeItems.length);
                imageArea.innerHTML = `<img src="${activeItems[currentActiveIndex].file}" alt="ルーレット中">`;
            }, 50); 
	} else {
            // ストップ処理
            clearInterval(timerId);
            isRunning = false;
            actionBtn.innerText = "スタート！";
            actionBtn.className = "start-btn";
            
            // 止まった画像データを取得
            const resultItem = activeItems[currentActiveIndex];

            // 元の配列（items）の中での番号（1〜48）を割り出し、半角2桁にする
            const originalIndex = items.findIndex(item => item.file === resultItem.file);
            const numStr = String(originalIndex + 1).padStart(2, '0');
            
            // 画面に半角の番号、タイトル、説明文を反映
            titleArea.innerText = `(${numStr}) ${resultItem.title}`;
            descriptionArea.innerText = resultItem.text;
        }
        
    }
</script>
