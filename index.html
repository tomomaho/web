<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像ルーレット</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .image-area { width: 300px; height: 300px; margin: 20px auto; border: 4px solid #333; display: flex; align-items: center; justify-content: center; background: #fafafa; border-radius: 8px; overflow: hidden; position: relative; }
        img { width: 100%; height: 100%; object-fit: cover; }
        .placeholder { color: #888; font-size: 18px; font-weight: bold; }
        button { font-size: 20px; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 200px; transition: 0.2s; margin-bottom: 20px; }
        .start-btn { background: #28a745; color: white; }
        .start-btn:hover { background: #218838; }
        .stop-btn { background: #dc3545; color: white; }
        .stop-btn:hover { background: #c82333; }
        /* 説明文エリアのスタイル */
        .description-area { min-height: 60px; padding: 15px; background: #f8f9fa; border-radius: 5px; border-left: 5px solid #007bff; text-align: left; font-size: 16px; line-height: 1.5; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>画像ルーレット</h2>
    <div class="image-area" id="imageArea">
        <span class="placeholder">スタートを押してね！</span>
    </div>
    <button id="actionBtn" class="start-btn" onclick="toggleRoulette()">スタート！</button>
    
    <!-- 画像の下部に説明文を表示するエリアを追加 -->
    <div class="description-area" id="descriptionArea">
        ここに画像の説明が表示されます。
    </div>
</div>

<script>
    // 1. 15枚の画像（1.png 〜 15.png）と、それぞれの説明文を設定
    const items = [
        { file: "1.png", text: "【1枚目の説明】ここに画像1に関する解説を書いてください。" },
        { file: "2.png", text: "【2枚目の説明】画像2の説明です。" },
        { file: "3.png", text: "【3枚目の説明】画像3の説明です。" },
        { file: "4.png", text: "【4枚目の説明】画像4の説明です。" },
        { file: "5.png", text: "【5枚目の説明】画像5の説明です。" },
        { file: "6.png", text: "【6枚目の説明】画像6の説明です。" },
        { file: "7.png", text: "【7枚目の説明】画像7の説明です。" },
        { file: "8.png", text: "【8枚目の説明】画像8の説明です。" },
        { file: "9.png", text: "【9枚目の説明】画像9の説明です。" },
        { file: "10.png", text: "【10枚目の説明】画像10の説明です。" },
        { file: "11.png", text: "【11枚目の説明】画像11の説明です。" },
        { file: "12.png", text: "【12枚目の説明】画像12の説明です。" },
        { file: "13.png", text: "【13枚目の説明】画像13の説明です。" },
        { file: "14.png", text: "【14枚目の説明】画像14の説明です。" },
        { file: "15.png", text: "15.png", text: "【15枚目の説明】画像15の説明です。" }
    ];

    let timerId = null;
    let isRunning = false;
    let currentIndex = 0;

    const imageArea = document.getElementById('imageArea');
    const actionBtn = document.getElementById('actionBtn');
    const descriptionArea = document.getElementById('descriptionArea');

    function toggleRoulette() {
        if (!isRunning) {
            // スタート処理
            isRunning = true;
            actionBtn.innerText = "ストップ！";
            actionBtn.className = "stop-btn";
            descriptionArea.innerText = "ルーレット中..."; // 回転中はテキストを変更
            
            timerId = setInterval(() => {
                currentIndex = Math.floor(Math.random() * items.length);
                imageArea.innerHTML = `<img src="${items[currentIndex].file}" alt="ルーレット中">`;
            }, 50); 
        } else {
            // ストップ処理
            clearInterval(timerId);
            isRunning = false;
            actionBtn.innerText = "スタート！";
            actionBtn.className = "start-btn";
            
            // ストップした画像のデータから、説明文を画面に表示
            descriptionArea.innerText = items[currentIndex].text;
        }
    }
</script>

</body>
</html>
